rules:
  - id: java-path-traversal-concat-into-fs-api
    languages: [java]
    severity: ERROR
    message: >
      A filesystem path is built with string concatenation (CWE-22). Resolve
      against a fixed base directory and verify the canonical path stays
      inside it (getCanonicalPath/normalize + startsWith) before use.
    metadata:
      cwe: CWE-22
    pattern-either:
      - pattern: new File(<... $A + $B ...>)
      - pattern: new FileInputStream(<... $A + $B ...>)
      - pattern: new FileOutputStream(<... $A + $B ...>)
      - pattern: new FileReader(<... $A + $B ...>)
      - pattern: new FileWriter(<... $A + $B ...>)
      - pattern: new RandomAccessFile(<... $A + $B ...>, ...)
      - pattern: Paths.get(<... $A + $B ...>)
      - pattern: Path.of(<... $A + $B ...>)
      - pattern: $FS.getPath(<... $A + $B ...>)

  - id: java-path-traversal-unvalidated-resolve
    languages: [java]
    severity: WARNING
    message: >
      An untrusted file name is resolved or opened without a containment
      check on the canonical/normalized path (CWE-22).
    metadata:
      cwe: CWE-22
    patterns:
      - pattern-either:
          - pattern: new File($BASE, $NAME)
          - pattern: new File($NAME)
          - pattern: $BASE.resolve($NAME)
      - pattern-not: new File($BASE, "...")
      - pattern-not: new File("...")
      - pattern-not: $BASE.resolve("...")
      # Suppress when the enclosing method canonicalizes/normalizes the path.
      # The deep-expression operator <... E ...> only parses in an expression
      # position, so each guard places the check inside an `if` condition or a
      # variable initializer - the two forms fixed code actually uses.
      - pattern-not-inside: |
          $RT $M(...) {
            ...
            if (<... $X.getCanonicalPath() ...>) { ... }
            ...
          }
      - pattern-not-inside: |
          $RT $M(...) {
            ...
            $T $V = <... $X.getCanonicalPath() ...>;
            ...
          }
      - pattern-not-inside: |
          $RT $M(...) {
            ...
            if (<... $X.getCanonicalFile() ...>) { ... }
            ...
          }
      - pattern-not-inside: |
          $RT $M(...) {
            ...
            $T $V = <... $X.getCanonicalFile() ...>;
            ...
          }
      - pattern-not-inside: |
          $RT $M(...) {
            ...
            if (<... $X.normalize() ...>) { ... }
            ...
          }
      - pattern-not-inside: |
          $RT $M(...) {
            ...
            $T $V = <... $X.normalize() ...>;
            ...
          }
      - pattern-not-inside: |
          $RT $M(...) {
            ...
            if (<... $X.toRealPath(...) ...>) { ... }
            ...
          }
      - pattern-not-inside: |
          $RT $M(...) {
            ...
            $T $V = <... $X.toRealPath(...) ...>;
            ...
          }
